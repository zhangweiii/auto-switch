version: 2

project_name: auto-switch

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/zhangweiii/auto-switch/cmd.version={{.Version}}

archives:
  - formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md
      - README.zh.md
      - LICENSE

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - Merge pull request
      - Merge branch

brews:
  - name: auto-switch
    repository:
      owner: zhangweiii
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    commit_author:
      name: zhangweiii
      email: zhangweigemini@gmail.com
    directory: Formula
    commit_msg_template: "brew: update auto-switch to {{ .Tag }}"
    homepage: "https://github.com/zhangweiii/auto-switch"
    description: "Automatically switch between Claude Code accounts by lowest usage"
    license: "MIT"
    test: |
      assert_match version.to_s, shell_output("#{bin}/auto-switch --version")
    install: |
      bin.install "auto-switch"
